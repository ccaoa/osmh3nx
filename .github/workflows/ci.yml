name: Tests  # Continuous Integration

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging
      - package  # TODO Testing; remove before next release

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ endsWith(matrix.python-version, '-dev') }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.15-dev"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ endsWith(matrix.python-version, '-dev') }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[development]
          python -m pip install pytest

      - name: Smoke import package
        run: python -c "import osmh3nx; print(osmh3nx.__version__)"

      - name: Run pytest when tests are present
        shell: bash
        run: |
          if [ -d tests ]; then
            pytest tests -ra
          else
            echo "No tests/ directory detected; skipping pytest."
          fi
