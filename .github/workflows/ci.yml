name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[development]
          python -m pip install pytest

      - name: Check formatting with Black
        run: black . --check

      - name: Smoke import package
        run: python -c "import osmh3nx; print(osmh3nx.__version__)"

      - name: Run pytest when tests are present
        shell: bash
        run: |
          if [ -d tests ]; then
            pytest tests -ra
          else
            echo "No tests/ directory detected; skipping pytest."
          fi
